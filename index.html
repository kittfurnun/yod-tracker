<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ยอด</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f3f0;--surface:#fff;--surface2:#f0ede8;--border:#e2ddd6;--border2:#ccc7be;
  --text:#1a1714;--text2:#6b6456;--text3:#a09890;
  --accent:#2d5a3d;--gold:#b8860b;--gold-light:#fffbe6;--gold-border:#e6d080;
  --radius:10px;--radius-sm:6px;
}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem}
.page{max-width:920px;margin:0 auto;display:flex;flex-direction:column;gap:1rem}

.tabs{display:flex;gap:4px;background:var(--surface2);border-radius:var(--radius);padding:4px;border:1px solid var(--border)}
.tab{flex:1;text-align:center;padding:8px;font-size:14px;font-weight:600;border-radius:var(--radius-sm);cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:'Sarabun',sans-serif;transition:all .15s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}

.summary-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:1rem 1.5rem}
.summary-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.summary-row{display:flex;align-items:center;flex-wrap:wrap;gap:12px}
.summary-total{font-size:28px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.summary-total-label{font-size:12px;color:var(--text2);margin-right:16px;margin-top:2px}
.vendor-totals{display:flex;flex-wrap:wrap;gap:8px}
.vendor-total-pill{display:flex;align-items:center;gap:6px;padding:5px 13px;border-radius:20px;font-size:14px;font-weight:600}

.vendor-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.vendor-bar-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.vendor-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px 6px 8px;border-radius:20px;font-size:14px;font-weight:500;cursor:pointer;border:2px solid transparent;transition:all .15s;user-select:none}
.vendor-chip.selected{background:#fff}
.vendor-chip .del-v{margin-left:4px;opacity:.45;font-size:11px;cursor:pointer}
.vendor-chip .del-v:hover{opacity:1}
.btn-add-vendor{padding:6px 14px;font-size:13px;border-radius:20px;border:1.5px dashed var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:'Sarabun',sans-serif}
.btn-add-vendor:hover{border-color:var(--accent);color:var(--accent)}

.input-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:1.25rem 1.5rem}
.session-group{display:flex;gap:0;margin-bottom:1rem}
.session-btn{padding:8px 22px;font-size:14px;font-family:'Sarabun',sans-serif;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;font-weight:500}
.session-btn:first-child{border-radius:var(--radius-sm) 0 0 var(--radius-sm)}
.session-btn:last-child{border-radius:0 var(--radius-sm) var(--radius-sm) 0;border-left:none}
.session-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.fields-row{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap}
.field-group{display:flex;flex-direction:column;gap:4px}
.field-group label{font-size:12px;color:var(--text2);font-weight:500}
.field-input{padding:9px 13px;font-size:16px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:'Sarabun',sans-serif;width:130px;outline:none;transition:border-color .15s}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,90,61,.1)}
.field-input:disabled{background:var(--surface2);color:var(--text3);cursor:not-allowed}
.field-input.wide{width:180px}
.field-hint{font-size:11px;color:var(--text3);margin-top:3px}
.btn-save{padding:9px 22px;font-size:14px;font-family:'Sarabun',sans-serif;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;align-self:flex-end}
.btn-save:hover{background:#234a31}

.action-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.action-bar-left{display:flex;gap:8px;flex-wrap:wrap}
button.btn-secondary{padding:7px 16px;font-size:13px;font-family:'Sarabun',sans-serif;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);cursor:pointer;color:var(--text);transition:all .15s}
button.btn-secondary:hover{background:var(--surface2)}
button.btn-clear{padding:7px 16px;font-size:13px;font-family:'Sarabun',sans-serif;background:#fdf0f0;border:1px solid #e8c0c0;border-radius:var(--radius-sm);cursor:pointer;color:#a33030}
button.btn-clear:hover{background:#f9e0e0}

.table-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:var(--surface2);padding:10px 14px;text-align:left;font-weight:600;color:var(--text2);font-size:11px;border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
th.num{text-align:right}
td{padding:9px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
td.ref-id{font-weight:700;color:var(--text2);font-size:15px;width:52px}
td.ref-name{font-weight:600;font-size:15px;white-space:nowrap}
.chips-cell{display:flex;flex-wrap:wrap;gap:6px;padding:6px 14px;min-height:38px;align-items:center}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:16px;font-size:13px;font-weight:600}
.chip .cx{opacity:.55;font-size:11px;margin-left:2px;cursor:pointer}
.chip .cx:hover{opacity:1}
td.total-num{text-align:right;font-weight:700;font-size:15px;font-variant-numeric:tabular-nums;width:80px}
tr.zero-row td{color:var(--text3)}
tr.zero-row td.ref-name{color:var(--text3);font-weight:500}
tr.zero-row td.ref-id{color:var(--border2)}

tr.top1 td{background:#fff9e0} tr.top1 td.ref-name::before{content:'🥇 '}
tr.top2 td{background:#fefaf0} tr.top2 td.ref-name::before{content:'🥈 '}
tr.top3 td{background:#fef9f0} tr.top3 td.ref-name::before{content:'🥉 '}
tr.top4 td,tr.top5 td{background:#fdfaf5}
tr.top1 td.total-num,tr.top2 td.total-num,tr.top3 td.total-num{color:var(--gold)}

/* ── Weekly history ── */
.history-section{display:flex;flex-direction:column;gap:14px}
.week-group{}
.week-header{font-size:14px;font-weight:700;color:var(--text2);padding:8px 14px;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.week-header .week-total{font-size:15px;color:var(--accent);font-weight:700}
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;overflow:hidden}
.day-card-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;cursor:pointer;user-select:none;transition:background .12s}
.day-card-header:hover{background:var(--surface2)}
.day-card-left{display:flex;align-items:center;gap:10px}
.day-card-title{font-size:13px;font-weight:600;color:var(--text)}
.day-card-session{font-size:12px;color:var(--text3)}
.day-vendors-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.day-vendor-pill{font-size:12px;padding:3px 10px;border-radius:12px;font-weight:500}
.day-card-total{font-size:15px;font-weight:700;color:var(--accent);white-space:nowrap}
.day-card-right{display:flex;align-items:center;gap:10px}
.day-del{font-size:11px;color:#a33030;cursor:pointer;opacity:.5}
.day-del:hover{opacity:1}
.expand-icon{font-size:12px;color:var(--text3);transition:transform .2s}
.expand-icon.open{transform:rotate(180deg)}
.day-detail{display:none;border-top:1px solid var(--border)}
.day-detail.open{display:block}
.day-detail table{font-size:13px}
.day-detail th{font-size:10px;padding:7px 12px}
.day-detail td{padding:7px 12px}
.day-detail .chips-cell{padding:4px 12px;min-height:28px}
.day-detail .chip{font-size:11px;padding:3px 8px}
.no-history{text-align:center;padding:2.5rem;color:var(--text3);font-size:14px;line-height:2}

/* ── Dialog ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
@keyframes pop{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
.dialog{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:1.5rem;width:290px;box-shadow:0 8px 32px rgba(0,0,0,.14);animation:pop .17s ease}
.dialog h3{font-size:16px;font-weight:600;margin-bottom:12px}
.dialog input{width:100%;padding:9px 12px;font-size:15px;font-family:'Sarabun',sans-serif;border:1.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);outline:none;margin-bottom:14px}
.dialog input:focus{border-color:var(--accent)}
.dialog .foot{display:flex;gap:8px;justify-content:flex-end}
.dialog .foot button{padding:7px 16px;font-size:14px;font-family:'Sarabun',sans-serif;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer}
.dialog .foot .ok{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
</style>
</head>
<body>
<div class="page">
  <div class="tabs">
    <button class="tab active" id="tab-today" onclick="showTab('today')">📋 วันนี้</button>
    <button class="tab" id="tab-history" onclick="showTab('history')">📅 ประวัติรายสัปดาห์</button>
  </div>

  <!-- TODAY -->
  <div id="view-today" style="display:flex;flex-direction:column;gap:1rem">
    <div class="summary-card">
      <div class="summary-title">ยอดรวมวันนี้</div>
      <div class="summary-row">
        <div>
          <div class="summary-total" id="grand-total-num">0</div>
          <div class="summary-total-label">รวมทุก vendor</div>
        </div>
        <div class="vendor-totals" id="vendor-totals"></div>
      </div>
    </div>
    <div class="vendor-bar">
      <span class="vendor-bar-label">Vendor</span>
      <div id="vendor-list"></div>
      <button class="btn-add-vendor" id="add-vendor-btn">+ เพิ่ม Vendor</button>
    </div>
    <div class="input-card">
      <div class="session-group">
        <button class="session-btn active" id="btn-am">☀️ เช้า (AM)</button>
        <button class="session-btn" id="btn-pm">🌙 เย็น (PM)</button>
      </div>
      <div class="fields-row">
        <div class="field-group">
          <label>Ref No.</label>
          <input type="number" class="field-input" id="ref-input" placeholder="เช่น 1" min="1" max="36" maxlength="2" oninput="if(this.value.length>2)this.value=this.value.slice(0,2)"/>
          <div class="field-hint">กด Enter → ไปช่อง Amount</div>
        </div>
        <div class="field-group">
          <label>Amount</label>
          <input type="text" class="field-input wide" id="amount-input" placeholder="200 หรือ 200/200 หรือ 200*200" disabled/>
          <div class="field-hint">/ หรือ * = บันทึกทั้งคู่</div>
        </div>
        <button class="btn-save" id="save-btn">บันทึก</button>
      </div>
    </div>
    <div class="action-bar">
      <div class="action-bar-left">
        <button class="btn-secondary" id="export-btn">📥 Export Excel</button>
      </div>
      <button class="btn-clear" id="clear-day-btn">🗑 ล้างข้อมูลวันนี้</button>
    </div>
    <div class="table-card">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th style="width:52px">ID</th><th>ชื่อ</th>
            <th>รายละเอียด</th>
            <th class="num" style="width:80px">รวม</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="view-history" style="display:none">
    <div class="history-section" id="history-section"></div>
  </div>
</div>

<div class="overlay" id="vendor-overlay">
  <div class="dialog">
    <h3>เพิ่ม Vendor</h3>
    <input type="text" id="vendor-name-input" placeholder="ชื่อ Vendor..."/>
    <div class="foot">
      <button id="vendor-cancel">ยกเลิก</button>
      <button class="ok" id="vendor-confirm">เพิ่ม</button>
    </div>
  </div>
</div>

  <!-- Edit vendor dialog -->
<div class="overlay" id="edit-vendor-overlay">
  <div class="dialog">
    <h3>แก้ไข Vendor</h3>
    <label style="font-size:12px;color:var(--text2);font-weight:500">ชื่อ</label>
    <input type="text" id="edit-vendor-name" style="margin-top:6px"/>
    <label style="font-size:12px;color:var(--text2);font-weight:500">สี</label>
    <div id="color-picker" style="display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 16px"></div>
    <div class="foot">
      <button id="edit-vendor-cancel">ยกเลิก</button>
      <button class="ok" id="edit-vendor-confirm">บันทึก</button>
    </div>
  </div>
</div>

<script>
var REF_ORDER=[1,18,5,2,3,36,4,16,6,28,32,7,20,8,9,14,25,10,11,27,33,12,13,26,31,15,17,19,21,35,22,23,24,29,30,34];
var REF_NAME={1:'วอก',18:'ปลาคำ',5:'แหวน',2:'กระต่าย',3:'ปลาเงิน',36:'ใส้เดือน',4:'ก๋าแก๋',16:'นกแดง',6:'ไก่',28:'ปลาไหล',32:'กว๋าง',7:'แม่ชี',20:'ช้าง',8:'เห็น',9:'หมา',14:'หนู',25:'วัว',10:'กำปุ้ง',11:'เต่า',27:'ผีเสื้อ',33:'งู',12:'เป็ด',13:'ม้า',26:'นกยูง',31:'ผึ้ง',15:'หอย',17:'แมว',19:'สิงโต',21:'ปู',35:'นาค',22:'แพะ',23:'ก๋าดำ',24:'เสือ',29:'นกยาง',30:'กบ',34:'หมู'};
var PAIR={1:18,18:1,5:2,2:5,3:36,36:3,4:16,16:4,6:28,28:6,32:7,7:32,20:8,8:20,9:14,14:9,25:10,10:25,11:27,27:11,33:12,12:33,13:26,26:13,31:15,15:31,17:19,19:17,21:35,35:21,22:23,23:22,24:29,29:24,30:34,34:30};
var COLORS=['#e05252','#4a90d9','#2daa6e','#e0992a','#9b59b6','#16a085','#c0392b','#2980b9'];
var TM=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
var TMS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

var vendors=[],selectedVendor=null,session='am',tableData={};
REF_ORDER.forEach(function(id){tableData[id]=[];});

// ── localStorage ──────────────────────────────────────
function saveState(){try{localStorage.setItem('yod_v',JSON.stringify(vendors));localStorage.setItem('yod_sv',JSON.stringify(selectedVendor));localStorage.setItem('yod_s',session);localStorage.setItem('yod_td',JSON.stringify(tableData));}catch(e){}}
function loadState(){try{var v=localStorage.getItem('yod_v');if(v)vendors=JSON.parse(v);var sv=localStorage.getItem('yod_sv');if(sv!==null)selectedVendor=JSON.parse(sv);var s=localStorage.getItem('yod_s');if(s)session=s;var td=localStorage.getItem('yod_td');if(td){var p=JSON.parse(td);REF_ORDER.forEach(function(id){tableData[id]=p[id]||[];});}}catch(e){}}
function getHistory(){try{var h=localStorage.getItem('yod_hist');return h?JSON.parse(h):[]}catch(e){return [];}}
function saveHistory(h){try{localStorage.setItem('yod_hist',JSON.stringify(h));}catch(e){}}

// ── Date helpers ──────────────────────────────────────
function thaiDate(){var d=new Date();return d.getDate()+' '+TM[d.getMonth()]+' '+(d.getFullYear()+543);}
function thaiDateFile(){var d=new Date();return d.getDate()+'-'+TMS[d.getMonth()]+'-'+(d.getFullYear()+543);}
function getWeekKey(dateStr){
  // Parse "25-เม.ย.-2569" style
  var d=new Date();
  var y=d.getFullYear(),m=d.getMonth(),day=d.getDate();
  var dow=d.getDay(); // 0=sun
  var monday=new Date(d);monday.setDate(day-(dow===0?6:dow-1));
  var sunday=new Date(monday);sunday.setDate(monday.getDate()+6);
  function fmt(dt){return dt.getDate()+' '+TM[dt.getMonth()];}
  return fmt(monday)+' – '+fmt(sunday)+' '+(sunday.getFullYear()+543);
}
function hexAlpha(hex,a){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';}

// ── Tab ───────────────────────────────────────────────
function showTab(t){
  document.getElementById('view-today').style.display=t==='today'?'flex':'none';
  document.getElementById('view-history').style.display=t==='history'?'block':'none';
  document.getElementById('tab-today').classList.toggle('active',t==='today');
  document.getElementById('tab-history').classList.toggle('active',t==='history');
  if(t==='history')renderHistory();
}

// ── Vendors ───────────────────────────────────────────
function renderVendors(){
  var el=document.getElementById('vendor-list');
  if(!vendors.length){el.innerHTML='<span style="font-size:13px;color:var(--text3)">ยังไม่มี vendor</span>';renderSummary();return;}
  el.innerHTML=vendors.map(function(v,i){
    var sel=selectedVendor===i;
    return '<span class="vendor-chip'+(sel?' selected':'')+'" data-vi="'+i+'" style="color:'+v.color+';border-color:'+(sel?v.color:'transparent')+'">'
      +'<span style="width:10px;height:10px;border-radius:50%;background:'+v.color+';flex-shrink:0;display:inline-block"></span> '+v.name
      +'<span class="edit-v" data-evi="'+i+'" title="แก้ไข">✏️</span>'
      +'<span class="del-v" data-dvi="'+i+'">✕</span></span>';
  }).join('');
  renderSummary();
}
document.getElementById('vendor-list').addEventListener('click',function(e){
  var del=e.target.closest('.del-v');
  if(del){var i=+del.dataset.dvi;if(!confirm('ลบ vendor "'+vendors[i].name+'" ?'))return;var name=vendors[i].name;vendors.splice(i,1);if(selectedVendor===i)selectedVendor=vendors.length?0:null;else if(selectedVendor>i)selectedVendor--;REF_ORDER.forEach(function(id){tableData[id]=tableData[id].filter(function(e){return e.vendor!==name;});});saveState();renderVendors();renderTable();return;}
  var edit=e.target.closest('.edit-v');
if(edit){openEditVendor(+edit.dataset.evi);return;}
var chip=e.target.closest('.vendor-chip');if(chip){selectedVendor=+chip.dataset.vi;saveState();renderVendors();}
});
document.getElementById('add-vendor-btn').addEventListener('click',function(){document.getElementById('vendor-name-input').value='';document.getElementById('vendor-overlay').classList.add('open');setTimeout(function(){document.getElementById('vendor-name-input').focus();},50);});
document.getElementById('vendor-cancel').addEventListener('click',function(){document.getElementById('vendor-overlay').classList.remove('open');});
document.getElementById('vendor-confirm').addEventListener('click',addVendor);
document.getElementById('vendor-name-input').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();addVendor();}if(e.key==='Escape')document.getElementById('vendor-overlay').classList.remove('open');});
var editVendorIdx=null;
var COLORS_ALL=['#e05252','#4a90d9','#2daa6e','#e0992a','#9b59b6','#16a085','#c0392b','#2980b9','#e67e22','#1abc9c','#8e44ad','#2c3e50'];

function openEditVendor(i){
  editVendorIdx=i;
  document.getElementById('edit-vendor-name').value=vendors[i].name;
  // render color swatches
  var cp=document.getElementById('color-picker');
  cp.innerHTML=COLORS_ALL.map(function(c){
    var selected=vendors[i].color===c;
    return '<span data-c="'+c+'" style="width:28px;height:28px;border-radius:50%;background:'+c+';cursor:pointer;display:inline-block;border:3px solid '+(selected?'#1a1814':'transparent')+';transition:border .15s"></span>';
  }).join('');
  cp.querySelectorAll('span').forEach(function(el){
    el.addEventListener('click',function(){
      cp.querySelectorAll('span').forEach(function(s){s.style.border='3px solid transparent';});
      this.style.border='3px solid #1a1814';
    });
  });
  document.getElementById('edit-vendor-overlay').classList.add('open');
  setTimeout(function(){document.getElementById('edit-vendor-name').focus();},50);
}

document.getElementById('btn-pm').addEventListener('click',function(){setSession('pm');});

// ── Input: support / and * as pair separator ──────────
var refInput=document.getElementById('ref-input');
var amountInput=document.getElementById('amount-input');
refInput.addEventListener('keydown',function(e){
  if(e.key==='Enter'){e.preventDefault();var v=parseInt(refInput.value);if(!REF_NAME[v]){refInput.select();return;}amountInput.disabled=false;amountInput.value='';amountInput.focus();}
});
document.getElementById('save-btn').addEventListener('click',saveEntry);
amountInput.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();saveEntry();}});

function parsePaired(raw){
  // support both / and * as separator
  var sep=raw.indexOf('/')!==-1?'/':raw.indexOf('*')!==-1?'*':null;
  if(sep){var p=raw.split(sep);var a1=parseFloat(p[0]),a2=parseFloat(p[1]);if(!isNaN(a1)&&!isNaN(a2))return{paired:true,a1:a1,a2:a2};}
  var a=parseFloat(raw);if(!isNaN(a))return{paired:false,a:a};
  return null;
}

function saveEntry(){
  if(selectedVendor===null){alert('กรุณาเลือก Vendor ก่อนนะครับ');return;}
  var refId=parseInt(refInput.value);if(!REF_NAME[refId]){alert('Ref No. ไม่ถูกต้อง (1-36)');refInput.focus();return;}
  var raw=amountInput.value.trim();if(!raw){amountInput.focus();return;}
  var parsed=parsePaired(raw);
  if(!parsed){alert('รูปแบบไม่ถูกต้อง');return;}
  var vendor=vendors[selectedVendor],paired=PAIR[refId];
  if(parsed.paired){
    tableData[refId].push({vendor:vendor.name,color:vendor.color,amount:parsed.a1});
    if(paired&&REF_NAME[paired])tableData[paired].push({vendor:vendor.name,color:vendor.color,amount:parsed.a2});
  } else {
    tableData[refId].push({vendor:vendor.name,color:vendor.color,amount:parsed.a});
  }
  refInput.value='';amountInput.value='';amountInput.disabled=true;refInput.focus();
  saveState();renderTable();renderSummary();autoSaveToHistory();
}

// ── Summary ───────────────────────────────────────────
function renderSummary(){
  var grand=0,byVendor={};
  vendors.forEach(function(v){byVendor[v.name]={color:v.color,total:0};});
  REF_ORDER.forEach(function(id){tableData[id].forEach(function(e){grand+=e.amount;if(byVendor[e.vendor])byVendor[e.vendor].total+=e.amount;});});
  document.getElementById('grand-total-num').textContent=grand.toLocaleString('th-TH');
  var pills='';
  vendors.forEach(function(v){var t=byVendor[v.name]?byVendor[v.name].total:0;pills+='<div class="vendor-total-pill" style="background:'+hexAlpha(v.color,.12)+';color:'+v.color+'"><span style="width:8px;height:8px;border-radius:50%;background:'+v.color+';display:inline-block;margin-right:2px"></span>'+v.name+': <strong style="margin-left:4px">'+t.toLocaleString('th-TH')+'</strong></div>';});
  document.getElementById('vendor-totals').innerHTML=pills;
}

// ── Table ─────────────────────────────────────────────
function renderTable(){
  var totals=REF_ORDER.map(function(id){return{id:id,total:tableData[id].reduce(function(s,e){return s+e.amount;},0)};});
  var topIds={};totals.filter(function(x){return x.total>0;}).sort(function(a,b){return b.total-a.total;}).slice(0,5).forEach(function(x,i){topIds[x.id]=i+1;});
  var html='';
  REF_ORDER.forEach(function(id){
    var entries=tableData[id],total=entries.reduce(function(s,e){return s+e.amount;},0),zero=!entries.length,rank=topIds[id];
    var trClass=zero?'zero-row':rank?'top'+rank:'';
    var chips=entries.length?entries.map(function(e,ei){return '<span class="chip" style="background:'+hexAlpha(e.color,.14)+';color:'+e.color+'"><span style="width:7px;height:7px;border-radius:50%;background:'+e.color+';display:inline-block"></span> '+e.amount.toLocaleString('th-TH')+'<span class="cx" data-id="'+id+'" data-ei="'+ei+'">✕</span></span>';}).join(''):'<span style="color:var(--text3);font-size:13px">—</span>';
    html+='<tr class="'+trClass+'"><td class="ref-id">'+id+'</td><td class="ref-name">'+REF_NAME[id]+'</td><td style="padding:0"><div class="chips-cell">'+chips+'</div></td><td class="total-num">'+(zero?'—':total.toLocaleString('th-TH'))+'</td></tr>';
  });
  var tbody=document.getElementById('tbody');tbody.innerHTML=html;
  tbody.querySelectorAll('.cx').forEach(function(el){
    el.addEventListener('click',function(){
      var id=+this.dataset.id;
    var ei=+this.dataset.ei;
    var amount=tableData[id][ei].amount;
    var name=REF_NAME[id];
    if(!confirm('ลบ '+amount+' ออกจาก "'+name+'" ใช่ไหมคะ?'))return;
    tableData[id].splice(ei,1);
    saveState();renderTable();renderSummary();
    });
  });
}

// ── Export (auto-save history) ────────────────────────
document.getElementById('export-btn').addEventListener('click',function(){
  var sess=session==='am'?'เช้า':'เย็น';
  exportExcel(tableData,sess,thaiDate(),thaiDateFile());
});

function exportExcel(td,sessLabel,dateLabel,dateFile){
  var vnames=vendors.map(function(v){return v.name;});
  var byV={};vnames.forEach(function(n){byV[n]=0;});var grand=0;
  REF_ORDER.forEach(function(id){(td[id]||[]).forEach(function(e){grand+=e.amount;if(byV[e.vendor]!==undefined)byV[e.vendor]+=e.amount;});});

  var totals=REF_ORDER.map(function(id){return{id:id,total:(td[id]||[]).reduce(function(s,e){return s+e.amount;},0)};});
  var top5ids={};totals.filter(function(x){return x.total>0;}).sort(function(a,b){return b.total-a.total;}).slice(0,5).forEach(function(x,i){top5ids[x.id]=i+1;});

  var wb=new ExcelJS.Workbook();
  wb.creator='ยอด App';
  var ws=wb.addWorksheet('ยอด');
  var totalCols=2+vnames.length+1;

  // Row 1: Title
  var titleRow=ws.addRow(['ยอด '+dateLabel+' ('+sessLabel+')']);
  ws.mergeCells(1,1,1,totalCols);
  titleRow.getCell(1).font={name:'Sarabun',size:14,bold:true,color:{argb:'FF1a1814'}};
  titleRow.getCell(1).fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFf0ede8'}};
  titleRow.getCell(1).alignment={horizontal:'center',vertical:'middle'};
  titleRow.height=24;

  // Row 2: Summary
  var summaryParts=['ยอดรวม: '+grand.toLocaleString('th-TH')];
  vnames.forEach(function(n){summaryParts.push(n+': '+(byV[n]||0).toLocaleString('th-TH'));});
  var summRow=ws.addRow([summaryParts.join('     ')]);
  ws.mergeCells(2,1,2,totalCols);
  summRow.getCell(1).font={name:'Sarabun',size:11,bold:true,color:{argb:'FF2d5a3d'}};
  summRow.getCell(1).fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFe6f0ea'}};
  summRow.getCell(1).alignment={horizontal:'left',vertical:'middle'};
  summRow.height=20;

  // Row 3: spacer
  var vcRow=ws.addRow([]);
  ws.mergeCells(3,1,3,totalCols);
  vcRow.height=6;

  // Row 4: Header
  var headerVals=['ID','ชื่อ'].concat(vnames).concat(['รวม']);
  var hRow=ws.addRow(headerVals);
  hRow.height=20;
  hRow.eachCell(function(cell,ci){
    var bgColor='FF2d5a3d';
    if(ci===totalCols) bgColor='FF1a1814';
    else if(ci>2&&vendors[ci-3]) bgColor='FF'+vendors[ci-3].color.slice(1);
    cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:bgColor}};
    cell.font={name:'Sarabun',size:11,bold:true,color:{argb:'FFFFFFFF'}};
    cell.alignment={horizontal:ci<=2?'left':'center',vertical:'middle'};
    cell.border={bottom:{style:'medium',color:{argb:'FFFFFFFF'}}};
  });

  // Rows 5+: Data
  REF_ORDER.forEach(function(id){
    var entries=td[id]||[];
    var total=entries.reduce(function(s,e){return s+e.amount;},0);
    var byVendorExpr={};
    vnames.forEach(function(n){byVendorExpr[n]=[];});
    entries.forEach(function(e){if(byVendorExpr[e.vendor]!==undefined)byVendorExpr[e.vendor].push(e.amount);});
    var rowVals=[id,REF_NAME[id]];
    vnames.forEach(function(n){var arr=byVendorExpr[n];rowVals.push(arr.length?arr.join('+'):'');});
    rowVals.push(total||'');
    var dRow=ws.addRow(rowVals);
    dRow.height=18;
    var rank=top5ids[id];
    var top5bg=['FFFFF9e0','FFfefaf0','FFfef9f0','FFfdfaf5','FFfdfaf5'];
    var rowBg=rank?top5bg[rank-1]:'FFFFFFFF';
    dRow.eachCell(function(cell,ci){
      cell.font={name:'Sarabun',size:11,bold:ci===rowVals.length&&rank,
        color:{argb:ci===rowVals.length&&rank?'FFb8860b':'FF1a1814'}};
      cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:rowBg}};
      cell.alignment={horizontal:ci<=2?'left':'center',vertical:'middle'};
      if(ci>2&&ci<rowVals.length&&vnames[ci-3]){
        var vo=vendors.find(function(v){return v.name===vnames[ci-3];});
        if(vo&&byVendorExpr[vnames[ci-3]]&&byVendorExpr[vnames[ci-3]].length)
          cell.font={name:'Sarabun',size:11,bold:true,color:{argb:'FF'+vo.color.slice(1)}};
      }
      cell.border={
        top:{style:'thin',color:{argb:'FFe2ddd6'}},
        bottom:{style:'thin',color:{argb:'FFe2ddd6'}},
        left:{style:'thin',color:{argb:'FFe2ddd6'}},
        right:{style:'thin',color:{argb:'FFe2ddd6'}}
      };
    });
    if(rank){
      var medals=['🥇','🥈','🥉','④','⑤'];
      dRow.getCell(2).value=medals[rank-1]+' '+REF_NAME[id];
    }
  });

  // Column widths & freeze
  ws.getColumn(1).width=6;
  ws.getColumn(2).width=14;
  vnames.forEach(function(v,i){ws.getColumn(3+i).width=24;});
  ws.getColumn(totalCols).width=10;
  ws.views=[{state:'frozen',ySplit:4}];

  // Download
  wb.xlsx.writeBuffer().then(function(buffer){
    var blob=new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download='ยอด_'+dateFile+'-'+sessLabel+'.xlsx';
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
  });
}

// ── Auto-save to history ──────────────────────────────
function autoSaveToHistory(){
  var grand=REF_ORDER.reduce(function(s,id){return s+tableData[id].reduce(function(a,e){return a+e.amount;},0);},0);
  if(grand===0)return;
  var byVendor={};vendors.forEach(function(v){byVendor[v.name]={color:v.color,total:0};});
  REF_ORDER.forEach(function(id){tableData[id].forEach(function(e){if(byVendor[e.vendor])byVendor[e.vendor].total+=e.amount;});});
  var weekKey=getWeekKey();
  var record={
    dateLabel:thaiDate(),dateFile:thaiDateFile(),weekKey:weekKey,
    session:session==='am'?'เช้า':'เย็น',grand:grand,
    vendors:vendors.map(function(v){return{name:v.name,color:v.color,total:byVendor[v.name]?byVendor[v.name].total:0};}),
    tableData:JSON.parse(JSON.stringify(tableData))
  };
  var history=getHistory();
  var key=record.dateFile+'-'+record.session;
  var idx=-1;history.forEach(function(r,i){if(r.dateFile+'-'+r.session===key)idx=i;});
  if(idx>=0)history[idx]=record;else history.unshift(record);
  saveHistory(history);
}

// ── History (weekly) ──────────────────────────────────
function renderHistory(){
  var history=getHistory();
  var el=document.getElementById('history-section');
  if(!history.length){el.innerHTML='<div class="no-history">ยังไม่มีประวัติ 📭<br>กด "Export Excel" เพื่อบันทึกอัตโนมัติครับ</div>';return;}

  // group by week
  var weeks={},weekOrder=[];
  history.forEach(function(r,i){
    var wk=r.weekKey||'ไม่ระบุสัปดาห์';
    if(!weeks[wk]){weeks[wk]=[];weekOrder.push(wk);}
    weeks[wk].push({r:r,i:i});
  });

  var html='';
  weekOrder.forEach(function(wk){
    var records=weeks[wk];
    var weekGrand=records.reduce(function(s,x){return s+x.r.grand;},0);
    html+='<div class="week-group">'
      +'<div class="week-header"><span>สัปดาห์ '+wk+'</span><span class="week-total">รวม: '+weekGrand.toLocaleString('th-TH')+'</span></div>';

    records.forEach(function(x){
      var r=x.r,idx=x.i;
      var vendorPills=r.vendors.map(function(v){
        return '<span class="day-vendor-pill" style="background:'+hexAlpha(v.color,.13)+';color:'+v.color+'">'+v.name+': '+v.total.toLocaleString('th-TH')+'</span>';
      }).join('');

      // detail table (view-only)
      var detailHtml=buildDetailTable(r);

      html+='<div class="day-card">'
        +'<div class="day-card-header" onclick="toggleDetail(this)">'
          +'<div class="day-card-left">'
            +'<div>'
              +'<div class="day-card-title">'+r.dateLabel+'<span class="day-card-session"> · '+r.session+'</span></div>'
              +'<div class="day-vendors-row">'+vendorPills+'</div>'
            +'</div>'
          +'</div>'
          +'<div class="day-card-right">'
            +'<span class="day-card-total">'+r.grand.toLocaleString('th-TH')+'</span>'
            +'<span class="day-del" onclick="event.stopPropagation();deleteRecord('+idx+')" title="ลบ">✕</span>'
            +'<span class="expand-icon">▼</span>'
          +'</div>'
        +'</div>'
        +'<div class="day-detail">'+detailHtml+'</div>'
      +'</div>';
    });
    html+='</div>';
  });
  el.innerHTML=html;
}

function toggleDetail(header){
  var card=header.closest('.day-card');
  var detail=card.querySelector('.day-detail');
  var icon=header.querySelector('.expand-icon');
  var isOpen=detail.classList.contains('open');
  detail.classList.toggle('open',!isOpen);
  icon.classList.toggle('open',!isOpen);
}

function buildDetailTable(r){
  var td=r.tableData||{};
  var vnames=r.vendors.map(function(v){return v.name;});
  var header='<tr><th style="width:48px">ID</th><th>ชื่อ</th>';
  vnames.forEach(function(n){header+='<th class="num">'+n+'</th>';});
  header+='<th class="num">รวม</th></tr>';

  var rows='';
  REF_ORDER.forEach(function(id){
    var entries=td[id]||[];
    var total=entries.reduce(function(s,e){return s+e.amount;},0);
    var zero=!total;
    var byV={};vnames.forEach(function(n){byV[n]=[];});
    entries.forEach(function(e){if(byV[e.vendor])byV[e.vendor].push(e.amount);});
    var cells='';
    vnames.forEach(function(n){
      var arr=byV[n];
      var vendorObj=r.vendors.find(function(v){return v.name===n;})||{color:'#999'};
      if(arr.length){
        var chipsHtml=arr.map(function(a){return '<span class="chip" style="background:'+hexAlpha(vendorObj.color,.14)+';color:'+vendorObj.color+';cursor:default">'+a.toLocaleString('th-TH')+'</span>';}).join('');
        cells+='<td style="padding:0"><div class="chips-cell">'+chipsHtml+'</div></td>';
      } else {
        cells+='<td style="color:var(--text3);text-align:right;padding:7px 12px">—</td>';
      }
    });
    rows+='<tr'+(zero?' class="zero-row"':'')+'><td class="ref-id" style="padding:7px 12px">'+id+'</td><td class="ref-name" style="padding:7px 12px">'+REF_NAME[id]+'</td>'+cells+'<td class="total-num" style="padding:7px 12px">'+(zero?'—':total.toLocaleString('th-TH'))+'</td></tr>';
  });
  return '<div class="table-wrap"><table><thead>'+header+'</thead><tbody>'+rows+'</tbody></table></div>';
}

function deleteRecord(i){
  if(!confirm('ลบบันทึกวันนี้ใช่ไหมครับ?'))return;
  var h=getHistory();h.splice(i,1);saveHistory(h);renderHistory();
}
function hexAlpha(hex,a){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';}

  REF_ORDER.forEach(function(id){tableData[id]=[];});saveState();renderTable();renderSummary();
  
});
